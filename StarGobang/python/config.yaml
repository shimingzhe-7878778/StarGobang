# StarGobang 自迭代训练闭环配置
# 【核心铁律】
#   - 闭环三要素：自我对弈生成数据 → 训练新模型 → 新模型替换旧模型（循环 N 轮）
#   - 每轮自动：保存模型 (checkpoint) + 记录日志 (loss/胜率) + 导出最终 ONNX
#   - 严禁：调用 C++ 代码、包含推理逻辑、任何需人工更新的社区进度

# ============================================================================
# 迭代训练参数
# ============================================================================
TOTAL_ITERATIONS: 50          # 总迭代轮数
                                  # StarGo 迁移建议：围棋建议使用 200+ 轮
                                  # 五子棋验证：50 轮足够验证闭环有效性

GAMES_PER_ITER: 500           # 每轮自我对弈局数
                                  # 增加局数可提升数据质量，但耗时增加

EVAL_INTERVAL: 5              # 评估间隔：每 5 轮进行新模型 vs 上一版模型对战
                                  # 验证训练有效性（可选，设为 0 禁用）

EVAL_GAMES: 100               # 评估对战局数（当 EVAL_INTERVAL > 0 时生效）

# ============================================================================
# 训练超参数
# ============================================================================
TRAINING:
  BATCH_SIZE: 64              # 批次大小
  EPOCHS_PER_ITER: 3          # 每轮训练轮次
  LEARNING_RATE: 0.0001       # 学习率（主训练阶段）
  LR_DECAY: 0.95              # 学习率衰减因子（每轮后）
  MIN_LR: 1e-6                # 最小学习率
  
  # MCTS 参数（自我对弈用）
  MCTS_SIMULATIONS: 800       # MCTS 模拟次数
  TEMPERATURE: 1.0            # 温度值（高=探索，低=利用）
  TEMPERATURE_DECAY: 0.99     # 温度衰减（每轮后）
  MIN_TEMPERATURE: 0.5        # 最低温度

# ============================================================================
# 模型架构参数
# ============================================================================
MODEL:
  INPUT_CHANNELS: 10          # 输入通道数
                                  # 五子棋：10 (黑 4 步 + 白 4 步 + 当前玩家 + 对手)
                                  # StarGo 迁移：围棋改为 17 (AlphaGo 特征平面)
  
  HIDDEN_CHANNELS: 256        # 隐藏层通道数
  NUM_RESIDUAL_BLOCKS: 10     # 残差块数量
  
  BOARD_SIZE: 15              # 棋盘尺寸
                                  # StarGo 迁移：围棋改为 19

# ============================================================================
# 检查点与日志配置
# ============================================================================
CHECKPOINT_DIR: 'checkpoints' # 检查点保存目录
LOG_DIR: 'logs'               # 日志目录
MODEL_OUTPUT_DIR: 'models'    # 最终模型输出目录
ONNX_OUTPUT_PATH: 'models/model_gobang.onnx'  # 最终 ONNX 导出路径（相对于 MODEL_OUTPUT_DIR）

SAVE_EVERY_ITER: true         # 每轮都保存检查点
KEEP_LAST_N_CHECKPOINTS: 5    # 保留最近 N 个检查点（节省空间）

# ============================================================================
# 设备配置
# ============================================================================
DEVICE:
  CUDA: true                  # 使用 GPU
  DEVICE_ID: 0                # GPU 设备 ID

# ============================================================================
# 数据生成配置
# ============================================================================
DATA_GENERATION:
  USE_SYNTHETIC_ONLY: true    # 【协议合规】仅使用合成数据
  MAX_STEPS_PER_GAME: 200     # 每局最大步数

# ============================================================================
# 评估配置
# ============================================================================
EVALUATION:
  WIN_RATE_THRESHOLD: 0.55    # 胜率阈值（>55% 认为新模型更强）
  ENABLE_FORBIDDEN_MOVES: true # 启用禁手规则（黑棋）
